name: arena_comanda
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  firebase_core: ^3.10.1
  cloud_firestore: ^5.6.1
  firebase_auth: ^5.4.1
  font_awesome_flutter: ^10.7.0
  lucide_icons: ^0.257.0
  intl: ^0.19.0
  url_launcher: ^6.3.1
  fl_chart: ^0.70.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  # FERRAMENTA ADICIONADA:
  flutter_launcher_icons: ^0.13.1

# CONFIGURAÇÃO DO ÍCONE:
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/logo.png"
  min_sdk_android: 21
  adaptive_icon_background: "#0083B0"
  adaptive_icon_foreground: "assets/images/logo.png"

flutter:
  uses-material-design: true
  
  # Lembre-se de registrar a pasta de imagens aqui para o Flutter reconhecer a logo:
  assets:
    - assets/images/